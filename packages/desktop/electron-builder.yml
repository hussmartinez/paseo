npmRebuild: false
appId: sh.paseo-huss.desktop
productName: Paseo Huss
executableName: PaseoHuss
afterPack: ./scripts/after-pack.js
directories:
  output: release
files:
  - dist/**/*
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
publish:
  provider: github
  owner: hussmartinez
  repo: paseo
linux:
  category: Development
  icon: assets
  artifactName: "Paseo-Huss-${version}-${arch}.${ext}"
  maintainer: "Huss Martinez <dev@hussmartinez.xyz>"
  vendor: "Paseo-Huss"
  extraResources:
    - from: bin/paseo
      to: bin/paseo
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
